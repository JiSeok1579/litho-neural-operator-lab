# Stage 5 base config — pitch x dose process window at the Stage-4 balanced OP.
#
# Sweep is driven by the runner script:
#   pitch_nm        ∈ {16, 18, 20, 24, 28, 32}
#   dose_mJ_cm2     ∈ {21, 28.4, 40, 44.2, 59, 60}
#   domain_x_nm     = pitch_nm * 5
# Plus optional controls (sigma=0 no-q, sigma=2 no-q).
run:
  name: v2_stage5_pitch_dose
  seed: 7

geometry:
  pattern: line_space
  pitch_nm: 24.0                 # overridden by runner
  half_pitch_nm: 12.0
  line_cd_nm: 12.5
  grid_spacing_nm: 0.5
  domain_x_nm: 120.0             # overridden by runner: pitch * 5
  domain_y_nm: 120.0
  edge_roughness_enabled: true
  edge_roughness_amp_nm: 1.0
  edge_roughness_corr_nm: 5.0

exposure:
  wavelength_nm: 13.5
  dose_mJ_cm2: 40.0              # overridden by runner
  reference_dose_mJ_cm2: 40.0
  dose_norm: 1.0                 # recomputed by helper from dose_mJ_cm2
  eta: 1.0
  Hmax_mol_dm3: 0.2
  electron_blur_enabled: true
  electron_blur_sigma_nm: 2.0
  target_NILS: 1.5

peb:
  time_s: 30.0
  temperature_C: 100.0
  DH_nm2_s: 0.5
  kloss_s_inv: 0.005
  kdep_s_inv: 0.5
  dt_s: 0.5

quencher:
  enabled: true
  Q0_mol_dm3: 0.02
  DQ_nm2_s: 0.0
  kq_s_inv: 1.0

development:
  method: threshold
  P_threshold: 0.5

outputs:
  save_fields: false
  save_figures: false
  save_metrics_csv: true
