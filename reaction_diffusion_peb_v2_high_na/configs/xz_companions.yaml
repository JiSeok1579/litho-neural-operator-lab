# Representative configurations to render as single-line x-z cross-sections.
#
# Each entry runs the x-z PEB solver with the listed chemistry, then crops
# the result to a single line (centred on the middle line) ±pitch/2 in x.
# Default film/standing-wave defaults apply unless overridden.
defaults:
  film_thickness_nm: 20.0
  dz_nm: 0.5
  standing_wave_period_nm: 6.75
  standing_wave_amplitude: 0.0      # off by default; Stage-6 entries override
  standing_wave_phase_rad: 0.0
  absorption_length_nm: 30.0
  P_threshold: 0.5

cases:
  - tag: stage1_clean_baseline
    description: "Stage 1 clean geometry baseline (σ=0, t=30, no quencher)"
    pitch_nm: 24
    line_cd_nm: 12.5
    domain_x_nm: 120
    grid_spacing_nm: 0.5
    dose_mJ_cm2: 40
    reference_dose_mJ_cm2: 40
    eta: 1.0
    Hmax_mol_dm3: 0.20
    sigma_nm: 0.0
    DH_nm2_s: 0.8           # Stage 1 baseline used DH=0.8 (the clean-geometry baseline)
    time_s: 30
    kdep_s_inv: 0.5
    kloss_s_inv: 0.005
    quencher_enabled: false
    Q0_mol_dm3: 0.0
    kq_s_inv: 0.0
    DQ_nm2_s: 0.0

  - tag: stage1B_overbudget_sigma5_t60
    description: "Stage 1B over-budget reference (σ=5, t=60 → lines collapse)"
    pitch_nm: 24
    line_cd_nm: 12.5
    domain_x_nm: 120
    grid_spacing_nm: 0.5
    dose_mJ_cm2: 40
    reference_dose_mJ_cm2: 40
    eta: 1.0
    Hmax_mol_dm3: 0.20
    sigma_nm: 5.0
    DH_nm2_s: 0.8
    time_s: 60
    kdep_s_inv: 0.5
    kloss_s_inv: 0.005
    quencher_enabled: false
    Q0_mol_dm3: 0.0
    kq_s_inv: 0.0
    DQ_nm2_s: 0.0

  - tag: stage4_balanced_v2_OP
    description: "Stage 4 / v2 OP balanced (σ=2, Q0=0.02, kq=1.0, DH=0.5, t=30) — recommended OP"
    pitch_nm: 24
    line_cd_nm: 12.5
    domain_x_nm: 120
    grid_spacing_nm: 0.5
    dose_mJ_cm2: 40
    reference_dose_mJ_cm2: 40
    eta: 1.0
    Hmax_mol_dm3: 0.20
    sigma_nm: 2.0
    DH_nm2_s: 0.5
    time_s: 30
    kdep_s_inv: 0.5
    kloss_s_inv: 0.005
    quencher_enabled: true
    Q0_mol_dm3: 0.02
    kq_s_inv: 1.0
    DQ_nm2_s: 0.0

