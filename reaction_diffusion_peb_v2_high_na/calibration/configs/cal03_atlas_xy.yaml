# Phase 2B Part A — x-y sensitivity atlas anchor (frozen v2 OP).
# Sensitivity / controllability study, NOT a calibration.
run:
  name: cal03_atlas_xy
  seed: 7

geometry:
  pattern: line_space
  pitch_nm: 24.0
  half_pitch_nm: 12.0
  line_cd_nm: 12.5
  grid_spacing_nm: 0.5
  domain_x_nm: 120.0
  domain_y_nm: 120.0
  edge_roughness_enabled: true
  edge_roughness_amp_nm: 1.0
  edge_roughness_corr_nm: 5.0

exposure:
  wavelength_nm: 13.5
  dose_mJ_cm2: 40.0
  reference_dose_mJ_cm2: 40.0
  dose_norm: 1.0
  eta: 1.0
  Hmax_mol_dm3: 0.20
  electron_blur_enabled: true
  electron_blur_sigma_nm: 2.0
  target_NILS: 1.5

peb:
  time_s: 30.0
  temperature_C: 100.0
  DH_nm2_s: 0.50
  kloss_s_inv: 0.005
  kdep_s_inv: 0.50
  dt_s: 0.5

quencher:
  enabled: true
  Q0_mol_dm3: 0.02
  DQ_nm2_s: 0.0
  kq_s_inv: 1.0

development:
  method: threshold
  P_threshold: 0.5

oat:
  dose_mJ_cm2:           [21, 28.4, 40, 44.2, 59, 60]
  electron_blur_sigma_nm: [0, 1, 2, 3]
  DH_nm2_s:              [0.3, 0.5, 0.8]
  time_s:                [20, 30, 45]
  Q0_mol_dm3:            [0.0, 0.005, 0.01, 0.02, 0.03]

pairs:
  - {x: dose_mJ_cm2,  y: electron_blur_sigma_nm}
  - {x: time_s,       y: DH_nm2_s}
  - {x: electron_blur_sigma_nm, y: Q0_mol_dm3}
  - {x: dose_mJ_cm2,  y: pitch_nm}
  - {x: Q0_mol_dm3,   y: pitch_nm}

pair_axis_values:
  pitch_nm: [16, 18, 20, 24, 28, 32]
