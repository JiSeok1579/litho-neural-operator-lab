    from the Mode A fixed-design template). Production users that
    require Mode A geometry conformance should pick G_4867 instead.
    Mode B exploration showed no Mode-A-geometry chemistry that
    beats G_4867 on CD accuracy.
  when_to_prefer: |
    Production alternative when wider time-window robustness is
    more important than strict CD accuracy at nominal time, or
    when an open-design slot is acceptable. Pair with G_4867 as
    the Mode A fallback.

mode_a_geometry_blindspot_closed: true
mode_b_geometry_chemistry_blindspot_summary: |
  43 Mode B candidates with pitch ~24 / ratio ~0.52 (Mode A geometry
  box) were characterised in Stage 06Q. Only J_2780 reached 06J
  top-10. None has FD evidence of beating G_4867 on both CD accuracy
  and MC stability. Documented for future reference; no further
  action under this thread.

