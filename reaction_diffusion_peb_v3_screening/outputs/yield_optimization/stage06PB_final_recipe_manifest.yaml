stage: 06PB
status: FINAL
title: PEB v3 Mode A + Mode B final recipe manifest (06PB closeout)
policy:
  v2_OP_frozen: true
  published_data_loaded: false
  external_calibration: none
  notes: |
    Nominal-model surrogate study on the v2 frozen physics. FD MC
    strict_pass_prob is the ranking authority for both Mode A and
    Mode B; the 06PB feature-engineered surrogate is the screening
    layer. No external / measured calibration. Closed Stage 04C /
    04D / 06C artefacts remain unchanged.

preferred_surrogate: stage06PB
preferred_surrogate_models:
  classifier:    outputs/models/stage06PB_classifier.joblib
  regressor4:    outputs/models/stage06PB_regressor.joblib
  aux_cd_fixed:  outputs/models/stage06PB_aux_cd_fixed_regressor.joblib
  strict_score:  outputs/models/stage06PB_strict_score_regressor.joblib
  feature_list:  outputs/models/stage06R_feature_list.json   # 11 raw + 9 derived
previous_baselines:
  stage06R: feature-engineered baseline before targeted AL
  stage06P: AL refresh before feature engineering
  stage06L: direct strict_score head, pre-feature-engineering
  stage06H: prior surrogate refresh used by Stage 06I Mode A selection

strict_thresholds:
  cd_tolerance_nm: 0.5
  ler_cap_nm:      3.0
  rationale_source: stage06G_threshold_selection.md

ranking_authority: |
  FD MC strict_pass_prob is the final ranking authority for both
  Mode A and Mode B recipe selection. The 06PB direct strict_score
  head is the candidate-proposal / screening layer; FD truth wins
  on disagreements. 06PB is calibrated within ~0.025 absolute on the
  J - G relative time-window advantage (06Q blindspot closed).

mode_a:
  scope:
    fixed_design:
      pitch_nm:      24
      line_cd_ratio: 0.52
      abs_len_nm:    50.0
  primary_recipe_id: G_4867
  primary_role: CD-accurate fixed-design default recipe
  primary_note: |
    Mode A default. pitch_nm = 24, line_cd_ratio = 0.52. Selected by
    Stage 06I from FD MC strict_pass_prob. Time window is moderate
    (strict_pass_width_s = 3 s); use J_1453 when wider time tolerance
    is more important than CD accuracy.

mode_b:
  scope:
    open_design: true
  primary_recipe_id: J_1453
  primary_role: open-design production alternative (wider time-window)
  primary_note: |
    Mode B production alternative. Open-design (pitch / ratio /
    abs_len participate in optimisation), NOT recipe-only Mode A
    template variation. Selected by Stage 06J Mode B strict-score #1,
    confirmed by 06J-B FD MC strict_pass = 0.747 at scale, and
    promoted by 06M-B time-window deep MC. 06PB feature-engineered
    surrogate calibrates the J - G time-window advantage to within
    +/- 0.025 absolute strict_pass_prob (06Q blindspot closed).

