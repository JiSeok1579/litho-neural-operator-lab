stage: 06I
policy:
  v2_OP_frozen: true
  published_data_loaded: false
  notes: 'Stage 06A is a nominal-model yield-proxy optimisation. The 04C

    surrogate is treated as an oracle for the v2 nominal physics, not

    for a real fab. No external calibration has been performed.

    '
  external_calibration: none
scope:
  mode_a_fixed_design:
    pitch_nm: 24
    line_cd_ratio: 0.52
    abs_len_nm: 50.0
  mode_b_open_design: out of scope -- deferred to a later stage
strict_thresholds:
  cd_tolerance_nm: 0.5
  ler_cap_nm: 3.0
  rationale_source: stage06G_threshold_selection.md
ranking_authority: FD MC strict_pass_prob is the final ranking authority for Mode
  A recipe selection. The 06G surrogate's strict_score is treated as candidate proposal
  / screening only. The 06H surrogate refresh did not improve strict ranking (only
  1 of 6 06G representatives stayed in 06H top-20), so this manifest uses FD truth,
  not surrogate ranks.
primary_recommended_recipe: G_4867
primary_recommended_recipe_kind: fd_stability_best
primary_selection_note: 'FD MC truth places G_4867 (strict_pass_prob = 0.680) above
  the 06G surrogate''s strict-score #1 G_3691 (0.430) and above the 06G surrogate''s
  margin-best G_4299 (0.467). The earlier note in the spec saying ''if G_4299 is the
  current primary winner'' was written before 06H FD MC ran -- 06H FD truth supersedes
  that placeholder.'
