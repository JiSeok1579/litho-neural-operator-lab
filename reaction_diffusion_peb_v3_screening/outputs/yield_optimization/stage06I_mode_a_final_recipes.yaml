limitations:
- Nominal v2 physics only -- not externally calibrated.
- FD ranking authority is internal model truth, not real-fab yield. Do not interpret
  strict_pass_prob as wafer-level yield.
- Mode A only -- pitch=24 nm, line_cd_ratio=0.52 fixed.
- Mode B open-design exploration is deferred to a later stage.
- The 06H surrogate was retrained at n_estimators=200 on the 4-target regressor to
  keep the joblib under 100 MB, vs n_estimators=300 on classifier and aux. Test-set
  metrics are unchanged at 3-decimal precision.
