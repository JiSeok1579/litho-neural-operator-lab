# v3 candidate parameter space.
# Mix of discrete (choice) and continuous (uniform) ranges.
parameters:
  - name: pitch_nm
    type: choice
    values: [18, 20, 24, 28, 32]

  - name: line_cd_ratio
    type: choice
    values: [0.45, 0.52, 0.60]

  - name: dose_mJ_cm2
    type: uniform
    low: 21.0
    high: 60.0

  - name: sigma_nm
    type: uniform
    low: 0.0
    high: 3.0

  - name: DH_nm2_s
    type: uniform
    low: 0.3
    high: 0.8

  - name: time_s
    type: uniform
    low: 20.0
    high: 45.0

  - name: Hmax_mol_dm3
    type: uniform
    low: 0.15
    high: 0.22

  - name: kdep_s_inv
    type: uniform
    low: 0.35
    high: 0.65

  - name: Q0_mol_dm3
    type: uniform
    low: 0.0
    high: 0.03

  - name: kq_s_inv
    type: uniform
    low: 0.5
    high: 2.0

  - name: abs_len_nm
    type: uniform
    low: 15.0
    high: 100.0

# Derived parameters that are not sampled but computed per candidate.
derived:
  - name: line_cd_nm
    formula: "pitch_nm * line_cd_ratio"
  - name: domain_x_nm
    formula: "pitch_nm * 5"          # FFT-seam-safe: integer multiple of pitch
  - name: dose_norm
    formula: "dose_mJ_cm2 / 40.0"

# Held fixed across all candidates (v2 nominal physics conventions).
fixed:
  reference_dose_mJ_cm2: 40.0
  eta:                   1.0
  kloss_s_inv:           0.005
  DQ_nm2_s:              0.0
  domain_y_nm:           120.0
  grid_spacing_nm:       0.5
  edge_roughness_amp_nm: 1.0
  edge_roughness_corr_nm: 5.0
  edge_roughness_seed:   7
  P_threshold:           0.5
  dt_s:                  0.5
